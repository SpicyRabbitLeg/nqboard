# 集群名称
brokerClusterName=DefaultCluster

# Broker 名称（主从节点必须相同）
brokerName=broker-a

# Broker ID：0=Master，>0=Slave
brokerId=0

# 删除文件时间点（凌晨4点）
deleteWhen=04

# 文件保留时间（小时）
fileReservedTime=72

# Broker角色
# ASYNC_MASTER 异步主节点
# SYNC_MASTER  同步主节点
# SLAVE        从节点
brokerRole=ASYNC_MASTER

# 刷盘策略
# ASYNC_FLUSH  异步刷盘（性能好）
# SYNC_FLUSH   同步刷盘（可靠性高）
flushDiskType=ASYNC_FLUSH

# 监听端口
listenPort=10911

# 服务器：本机地址
brokerIP1=127.0.0.1

# NameServer地址
namesrvAddr=nqboard-rocketmq-server:9876

# 存储路径（容器内默认路径）
storePathRootDir=/home/rocketmq/store
storePathCommitLog=/home/rocketmq/store/commitlog
storePathConsumeQueue=/home/rocketmq/store/consumequeue
storePathIndex=/home/rocketmq/store/index
storeTraceMsgEnable=false

# ==============================================
# 分布式事务消息（回查）核心配置（官方完整）
# ==============================================

# 开启事务消息（默认true）
transactionMessageEnable=true

# 事务消息超时时间（毫秒）
# 默认：60000（60秒）
transactionTimeout=60000

# 第一次回查延迟（毫秒）
# 默认：6000（6秒）
# 第N次回查 = transactionCheckInterval × 2^(N-1)
transactionCheckInterval=3000

# 最大回查次数
# 默认：15次（超过则消息被丢弃/死信）
transactionCheckMax=6

# 事务回查线程池最小线程数
transactionCheckThreadPoolMinSize=3

# 事务回查线程池最大线程数
transactionCheckThreadPoolMaxSize=10

# 事务回查请求队列大小
transactionCheckRequestQueueMaxSize=10000

# ==============================================
# 其他常用完整配置（官方默认）
# ==============================================

# 自动创建Topic（生产建议关闭）
autoCreateTopicEnable=true

# 自动创建订阅组
autoCreateSubscriptionGroup=true

# 默认Topic队列数
defaultTopicQueueNums=8

# 允许发送Broker
acceptSendMessageEnable=true

# 允许消费
acceptConsumeMessageEnable=true

# 磁盘最大使用比例（超过则拒绝写入）
diskMaxUsedSpaceRatio=90

# 消息最大大小（默认4MB）
maxMessageSize=4194304

# 发送线程池大小
sendMessageThreadPoolNums=32

# 拉取消息线程池大小
pullMessageThreadPoolNums=32

# 单次拉取最大消息数
maxTransferCountOnPullMessage=32

# 消费失败重试次数（默认16次）
maxReconsumeTimes=16

# 是否允许从Slave读（默认false）
slaveReadEnable=false

# 消费队列缓存大小
consumeQueueMaxSize=100000

# 刷盘线程数
flushCommitLogThreadCount=4

# 刷盘间隔（毫秒）
flushIntervalCommitLog=500

# 提交日志页大小
commitLogPageSize=4096

# 写入消息时是否检测磁盘空间
checkSelfWhenWriteMessage=true

# 是否启用事务日志
transactionLoggerEnable=true