# ==================== 基础配置 ====================
# 第一个 EP（用于集群初始化，单节点可指向自身）
firstEp                nqboard-taos:6030

# 当前节点 FQDN（必须与 docker-compose 中 hostname 一致）
fqdn                   nqboard-taos

# 服务端口（默认 6030）
serverPort             6030

# 数据目录（容器内路径）
dataDir                /var/lib/taos

# 日志目录（容器内路径）
logDir                 /var/log/taos

# 临时目录
tempDir                /var/lib/taos/temp

# 缓存目录
cacheDir               /var/lib/taos/cache

# 脚本目录
scriptDir             /var/lib/taos/script

# ==================== 网络配置 ====================
# 监听所有接口（Docker 推荐）
# 若需限制 IP，可改为容器内网卡 IP，如 172.x.x.x
# serverIp             0.0.0.0

# 最大连接数
maxShellConns          5000
maxConnections         10000

# HTTP 端口（RESTful API）
httpPort               6041

# 是否启用 HTTP
http                   true

# 是否启用监控
monitor                true
monitorInterval        30

# ==================== 日志配置 ====================
# 日志级别：0=panic, 1=fatal, 2=error, 3=warn, 4=info, 5=debug, 6=trace
debugFlag              143

# 异步日志
asyncLog               1

# 日志文件最大数量
numOfLogFiles          10

# 单个日志文件最大大小（MB）
logFileSize            100

# ==================== 性能优化 ====================
# 缓存块大小（MB）
cacheBlockSize         16

# 每张表缓存的块数量
blocksPerVnode         100

# 最小保留天数
keep                   3650
days                   10
rowsPerBlock           4096

# 压缩选项
compressMsgSize        -1
compressColData        1

# ==================== 其他常用配置 ====================
# 时区
timezone               Asia/Shanghai

# 字符集
charset                UTF-8

# 语言
locale                 en_US.UTF-8

# 仲裁器（单节点无需）
# arbitrator           arb:6030

# 启用 Telemtry（建议关闭）
telemetryReporting     0

# 启用崩溃报告（建议关闭）
crashReporting         0

# ==================== 安全与认证 ====================
# 默认用户密码（首次登录后建议修改）
# defaultPass          123456

# 启用密码登录（推荐）
# passwordLogin        1

# 启用审计日志
# audit                1